<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Service - Status</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eceff1; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        .icon { font-size: 50px; color: #2196f3; margin-bottom: 10px; }
        h1 { font-size: 1.4rem; color: #333; margin-bottom: 1rem; }
        .status-box { background: #e3f2fd; color: #1e88e5; padding: 10px; border-radius: 8px; font-size: 0.9rem; border: 1px solid #bbdefb; }
        .btn-dummy { margin-top: 15px; width: 100%; padding: 10px; background: #2196f3; color: white; border: none; border-radius: 5px; cursor: not-allowed; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon">👤</div>
        <h1>Servicio Auth</h1>
        <div class="status-box">
            <strong>Estado:</strong> Protegido <br>
            <strong>Sesiones:</strong> Activas
        </div>
        <button class="btn-dummy">Gestionar Usuarios</button>
    </div>
</body>
</html>
