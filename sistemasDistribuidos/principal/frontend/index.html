 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Rappi Distributed App</title>
    <style>
        :root { --rappi-orange: #FF441F; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f8f9fa; }
        .nav { background: var(--rappi-orange); color: white; padding: 1rem; text-align: center; font-weight: bold; }
        .container { max-width: 600px; margin: 20px auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .hidden { display: none; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: var(--rappi-orange); color: white; border: none; padding: 12px; width: 100%; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .store-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 10px 0; }
    </style>
</head>
<body>

<div class="nav">RAPPI - SISTEMAS DISTRIBUIDOS</div>

<div class="container">
    <div id="view-login" class="card">
        <h2>Bienvenido</h2>
        <input type="text" id="user" placeholder="Usuario">
        <input type="password" id="pass" placeholder="Contraseña">
        <button onclick="doLogin()">Entrar</button>
    </div>

    <div id="view-stores" class="card hidden">
        <h2>Tiendas Disponibles</h2>
        <div id="store-list">Cargando tiendas...</div>
        <button style="margin-top:20px; background:#666;" onclick="showView('view-login')">Cerrar Sesión</button>
    </div>

    <div id="view-order" class="card hidden">
        <h2 style="color: green;">¡Pedido Exitoso!</h2>
        <p>Estado del repartidor:</p>
        <div id="gps-status" style="font-weight: bold; font-size: 1.2rem;">Localizando...</div>
        <button style="margin-top:20px;" onclick="showView('view-stores')">Volver a tiendas</button>
    </div>
</div>

<script>
    function showView(viewId) {
        ['view-login', 'view-stores', 'view-order'].forEach(v => document.getElementById(v).classList.add('hidden'));
        document.getElementById(viewId).classList.remove('hidden');
    }

    async function doLogin() {
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        
        try {
            const res = await fetch('/gateway/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ user, pass })
            });
            if (res.ok) {
                loadStores();
                showView('view-stores');
            } else { alert("Credenciales incorrectas"); }
        } catch (e) { alert("Error conectando al microservicio de Login"); }
    }

    async function loadStores() {
        try {
            const res = await fetch('/gateway/tiendas');
            const stores = await res.json();
            const list = document.getElementById('store-list');
            list.innerHTML = stores.map(s => `
                <div class="store-item">
                    <span><strong>${s.nombre}</strong><br><small>${s.categoria}</small></span>
                    <button style="width:auto; padding:5px 15px;" onclick="makeOrder('${s.id}')">Pedir</button>
                </div>
            `).join('');
        } catch (e) { document.getElementById('store-list').innerHTML = "Error cargando tiendas."; }
    }

    async function makeOrder(storeId) {
        try {
            const res = await fetch('/gateway/pedidos', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ storeId, userId: '123', item: 'Hamburguesa' })
            });
            if (res.ok) {
                showView('view-order');
                trackGps();
            }
        } catch (e) { alert("Error al crear pedido"); }
    }

    function trackGps() {
        setInterval(async () => {
            try {
                const res = await fetch('/gateway/rastreo/p1');
                const pos = await res.json();
                document.getElementById('gps-status').innerText = `Lat: ${pos.lat}, Lng: ${pos.lng}`;
            } catch (e) {}
        }, 3000);
    }
</script>

</body>
</html>
