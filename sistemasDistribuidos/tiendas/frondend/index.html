<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Microservicio - Tiendas</title>
</head>
<body>
    <h1>Tiendas Cercanas</h1>
    <div id="tiendas-grid"></div>

    <script>
        async function cargarTiendas() {
            try {
                const res = await fetch('http://localhost:3004/api/tiendas');
                const tiendas = await res.json();
                document.getElementById('tiendas-grid').innerHTML = tiendas.map(t => `
                    <div style="border: 1px solid #ccc; margin: 10px; padding: 10px;">
                        <h3>${t.nombre}</h3>
                        <p>Categoría: ${t.categoria}</p>
                    </div>
                `).join('');
            } catch (err) {
                document.getElementById('tiendas-grid').innerText = "Error en puerto 3004";
            }
        }
        cargarTiendas();
    </script>
</body>
</html>
