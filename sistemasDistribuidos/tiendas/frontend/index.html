<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tiendas Service - Status</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f1f8e9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .tienda-card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 350px; border-top: 8px solid #4caf50; }
        h1 { font-size: 1.3rem; color: #2e7d32; margin-top: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .item { background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #e0e0e0; text-align: center; font-size: 0.85rem; }
        .category { color: #666; font-style: italic; display: block; font-size: 0.75rem; }
    </style>
</head>
<body>
    <div class="tienda-card">
        <h1>Explorar Comercios</h1>
        <div class="grid">
            <div class="item"><strong>Pizzería</strong><span class="category">Italiana</span></div>
            <div class="item"><strong>Burger</strong><span class="category">Rápida</span></div>
            <div class="item"><strong>Donas</strong><span class="category">Postres</span></div>
            <div class="item"><strong>Sushi</strong><span class="category">Oriental</span></div>
        </div>
    </div>
</body>
</html>
