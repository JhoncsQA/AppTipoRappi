<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Microservicio - Pedidos</title>
</head>
<body>
    <h1>Gestión de Pedidos</h1>
    <ul id="lista-pedidos"></ul>

    <script>
        async function cargarPedidos() {
            try {
                const res = await fetch('http://localhost:3003/api/pedidos');
                const pedidos = await res.json();
                const lista = document.getElementById('lista-pedidos');
                lista.innerHTML = pedidos.map(p => `<li>${p.item} - <b>${p.estado}</b></li>`).join('');
            } catch (err) {
                console.error("Error en puerto 3003", err);
            }
        }
        cargarPedidos();
    </script>
</body>
</html>
