<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Pedidos Service - Status</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #fff3e0; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .order-card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 350px; border-left: 8px solid #ff9800; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .icon { font-size: 30px; }
        h1 { font-size: 1.2rem; color: #e65100; margin: 0; }
        .order-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; font-size: 0.9rem; }
        .tag { background: #fff3e0; color: #ef6c00; padding: 3px 8px; border-radius: 4px; font-weight: bold; font-size: 0.7rem; }
    </style>
</head>
<body>
    <div class="order-card">
        <div class="header">
            <h1>Órdenes Recientes</h1>
            <span class="icon">📦</span>
        </div>
        <div class="order-item">
            <span>Pizza Familiar</span>
            <span class="tag">EN CAMINO</span>
        </div>
        <div class="order-item">
            <span>Malteada Fresa</span>
            <span class="tag">PREPARANDO</span>
        </div>
        <div class="order-item">
            <span>Combo Salchipapa</span>
            <span class="tag">ENTREGADO</span>
        </div>
    </div>
</body>
</html>
