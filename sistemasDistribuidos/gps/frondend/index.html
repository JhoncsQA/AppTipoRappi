<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Microservicio - GPS</title>
</head>
<body>
    <h1>Localización en Tiempo Real</h1>
    <div id="data">Cargando coordenadas...</div>
    <button onclick="obtenerGps()">Actualizar Ubicación</button>

    <script>
        async function obtenerGps() {
            try {
                const res = await fetch('http://localhost:3002/api/ubicacion');
                const data = await res.json();
                document.getElementById('data').innerHTML = `
                    <p><b>Unidad:</b> ${data.unidad}</p>
                    <p><b>Lat:</b> ${data.lat} / <b>Lng:</b> ${data.lng}</p>
                `;
            } catch (err) {
                document.getElementById('data').innerText = "Error en puerto 3002";
            }
        }
        obtenerGps();
    </script>
</body>
</html>
