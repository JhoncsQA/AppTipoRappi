<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>GPS Service - Status</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #2c3e50; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .radar-card { background: #34495e; padding: 2rem; border-radius: 20px; text-align: center; border-bottom: 5px solid #3498db; width: 300px; }
        .circle { width: 100px; height: 100px; border: 5px solid #3498db; border-radius: 50%; margin: 0 auto 1rem; position: relative; animation: pulse 2s infinite; }
        @keyframes pulse { 
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.2); opacity: 0; }
        }
        h1 { font-size: 1.2rem; margin-bottom: 0.5rem; }
        .coord { font-family: monospace; color: #3498db; background: #2c3e50; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="radar-card">
        <div class="circle"></div>
        <h1>Servicio GPS</h1>
        <p>Estado: <span style="color: #2ecc71;">Rastreando</span></p>
        <p class="coord">Lat: 2.4419 | Lng: -76.6063</p>
    </div>
</body>
</html>
